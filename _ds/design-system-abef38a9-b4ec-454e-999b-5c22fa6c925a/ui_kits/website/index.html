/* Scroll-reveal wrapper — fades + lifts children into view, once. */
function Reveal({ children, as: Tag = "div", delay = 0, style, ...rest }) {
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) { setSeen(true); io.disconnect(); } }),
      { threshold: 0.14 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <Tag ref={ref} className={`reveal ${seen ? "is-in" : ""}`}
         style={{ transitionDelay: `${delay}ms`, ...style }} {...rest}>
      {children}
    </Tag>
  );
}

/* ===========================================================================
   App shell — tiny state router + scroll-aware nav + hash scrolling
   =========================================================================== */

function App() {
  const [route, setRoute] = useState({ name: "home" });
  const [scrolled, setScrolled] = useState(false);

  const go = useCallback((target) => {
    const next = { name: target.name, id: target.id };
    setRoute(next);
    if (target.hash) {
      // let the target screen mount, then scroll to the section
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const el = document.getElementById(target.hash);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        else window.scrollTo({ top: 0 });
      }));
    } else {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }, []);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 80);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  // Nav is solid (paper) except over a dark full-bleed top (home hero / screen heroes)
  const overDarkTop = (route.name === "home" || route.name === "listings" || route.name === "property") && !scrolled;
  const solidNav = route.name === "property" ? true : !overDarkTop;

  return (
    <>
      <Nav route={route} go={go} solid={route.name === "property" ? scrolled : !overDarkTop} />
      {route.name === "home" && <Home go={go} />}
      {route.name === "listings" && <ListingsScreen go={go} />}
      {route.name === "property" && <PropertyScreen id={route.id} go={go} />}
      <Footer go={go} />
    </>
  );
}

    '<code>/_ds/design-system-abef38a9-b4ec-454e-999b-5c22fa6c925a/_ds_bundle.js</code> resolves.' +
    '</div>';
} else {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}

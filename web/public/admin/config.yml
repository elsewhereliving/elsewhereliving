# ===========================================================================
# Elsewhere Living — content editor (Decap CMS) configuration.
# This describes the forms you see at /admin. You never edit this file in
# day-to-day use; it just tells the editor what fields a property has.
# ===========================================================================

backend:
  name: github               # log in with GitHub (handled by /auth + /callback on Cloudflare)
  repo: elsewhereliving/elsewhereliving
  branch: main
  base_url: https://elsewhere.living   # where the login handler lives (your live site)

# Where uploaded photos are saved (in your site's assets) and how they're
# linked on the page.
media_folder: "assets/listings"
public_folder: "/assets/listings"

# A nicer label and editorial polish.
site_url: https://elsewhere.living
display_url: https://elsewhere.living
logo_url: https://elsewhere.living/assets/imagery/favicon-512.png

# Shared option lists -------------------------------------------------------
# (Icons available for the "features" lines.)
collections:
  - name: listings
    label: "Properties for Sale"
    label_singular: "Property"
    description: "Add, edit or remove a property listing."
    folder: "web/src/content/listings"
    create: true
    delete: true
    format: json
    extension: json
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{title}} — {{market}}"
    sortable_fields: [title, market, priceNum, added, featuredOrder]
    fields:
      - { name: featured, label: "⭐ Feature on homepage", widget: boolean, default: false, hint: "Show this property in the featured row on the home page." }
      - { name: featuredOrder, label: "Homepage order", widget: number, value_type: int, required: false, hint: "Lower numbers show first (1, 2, 3 …). Only matters when 'Feature on homepage' is on." }
      - { name: title, label: "Title", widget: string }
      - { name: market, label: "Market", widget: select, options: ["Koh Samui", "Phuket", "Bangkok", "Bali", "Dubai"] }
      - { name: type, label: "Type", widget: select, options: ["Villa", "Condominium", "Land"] }
      - { name: status, label: "Status", widget: select, options: ["Move-In Ready", "Off-Plan"] }
      - { name: location, label: "Location line", widget: string, hint: "e.g. Bang Tao · Phuket · Thailand" }
      - { name: image, label: "Main photo", widget: image }
      - { name: gallery, label: "Photo gallery", widget: list, field: { name: photo, label: "Photo", widget: image } }
      - { name: price, label: "Price (shown)", widget: string, hint: 'e.g. "$2,450,000" or "From $6,000,000"' }
      - { name: priceNum, label: "Price (number, for sorting)", widget: number, value_type: int, required: false }
      - { name: priceOriginal, label: "Original price (optional)", widget: string, required: false }
      - { name: priceCurrency, label: "Currency (optional)", widget: string, required: false }
      - { name: beds, label: "Bedrooms", widget: number, value_type: int, default: 0, required: false }
      - { name: bedsLabel, label: "Bedrooms (text, optional)", widget: string, required: false }
      - { name: baths, label: "Bathrooms", widget: string, required: false }
      - { name: interior, label: "Interior size (optional)", widget: string, required: false }
      - { name: plot, label: "Plot size (optional)", widget: string, required: false }
      - { name: year, label: "Year built (optional)", widget: number, value_type: int, required: false }
      - { name: ownership, label: "Ownership (optional)", widget: string, required: false, hint: "e.g. Freehold" }
      - { name: view, label: "Views", widget: list, required: false, field: { name: tag, label: "View", widget: select, options: ["Sea View", "Beachfront", "Waterfront", "City View", "Mountain View", "Garden / Pool View"] } }
      - { name: blurb, label: "Short summary", widget: text, hint: "One paragraph shown in previews and search." }
      - { name: detail, label: "Full description", widget: text, hint: "Leave a blank line between paragraphs." }
      - name: features
        label: "Feature list"
        widget: list
        required: false
        label_singular: "Feature"
        summary: "{{fields.l}}"
        fields:
          - { name: l, label: "Feature", widget: string }
          - { name: i, label: "Icon", widget: select, default: "sparkles", options: ["sparkles", "bed", "bath", "pool", "view", "waves", "plot", "tree", "mountain", "sun", "key", "home", "building", "car", "shield", "gym", "music", "sofa", "utensils", "terrace", "users"] }
      - { name: mapQuery, label: "Map coordinates (optional)", widget: string, required: false, hint: 'e.g. "9.421,99.983" — leave blank if unknown' }
      - { name: place, label: "Full address (optional)", widget: string, required: false }
      - { name: added, label: "Sort weight (higher = nearer the top)", widget: number, value_type: int, required: false, default: 1 }

  - name: rentals
    label: "Vacation Rentals"
    label_singular: "Rental"
    description: "Add, edit or remove a rental villa."
    folder: "web/src/content/rentals"
    create: true
    delete: true
    format: json
    extension: json
    identifier_field: title
    slug: "r-{{slug}}"
    summary: "{{title}}"
    sortable_fields: [title, nightlyNum]
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: location, label: "Location line", widget: string, hint: "e.g. Plai Laem · Koh Samui · Thailand" }
      - { name: image, label: "Main photo", widget: image }
      - { name: gallery, label: "Photo gallery", widget: list, field: { name: photo, label: "Photo", widget: image } }
      - { name: nightly, label: "Nightly rate (shown)", widget: string, hint: 'e.g. "$3,180"' }
      - { name: nightlyNum, label: "Nightly rate (number, for sorting)", widget: number, value_type: int, required: false }
      - { name: beds, label: "Bedrooms", widget: number, value_type: int, default: 0 }
      - { name: baths, label: "Bathrooms", widget: string, required: false }
      - { name: guests, label: "Max guests", widget: number, value_type: int, required: false }
      - { name: occupancy, label: "Occupancy (text, optional)", widget: string, required: false }
      - { name: size, label: "Size (optional)", widget: string, required: false }
      - { name: sleeps, label: "Sleeps line (optional)", widget: string, required: false }
      - { name: note, label: "Note (optional)", widget: string, required: false, hint: "e.g. Fully staffed · private chef available" }
      - { name: view, label: "Views", widget: list, required: false, field: { name: tag, label: "View", widget: select, options: ["Sea View", "Beachfront", "Waterfront", "City View", "Mountain View", "Garden / Pool View"] } }
      - { name: blurb, label: "Short summary", widget: text }
      - { name: detail, label: "Full description", widget: text, hint: "Leave a blank line between paragraphs." }
      - name: features
        label: "Feature list"
        widget: list
        required: false
        summary: "{{fields.l}}"
        fields:
          - { name: l, label: "Feature", widget: string }
          - { name: i, label: "Icon", widget: select, default: "sparkles", options: ["sparkles", "bed", "bath", "pool", "view", "waves", "plot", "tree", "mountain", "sun", "key", "home", "building", "car", "shield", "gym", "music", "sofa", "utensils", "terrace", "users"] }
      - { name: mapQuery, label: "Map coordinates (optional)", widget: string, required: false }
      - { name: place, label: "Full address (optional)", widget: string, required: false }
